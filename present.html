<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>עיצוב משחקים — מצגת</title>
  <link rel="icon" href="assets/favicon.png">
  <style>
    :root { --ink:#1a1a1a; --cream:#fdf4e3; --yellow:#ffd23f; --mint:#6ee7b7; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:#0c0c0c; overflow:hidden; }
    body {
      font-family:'Space Grotesk','Heebo',system-ui,sans-serif;
      color:var(--cream); user-select:none; -webkit-user-select:none;
      touch-action:manipulation;
    }
    #stage {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }
    #slide {
      max-width:100vw; max-height:100vh; width:auto; height:auto;
      object-fit:contain; display:block;
      box-shadow:0 0 60px rgba(0,0,0,0.6);
    }
    /* top bar */
    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:5;
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; gap:16px;
      background:linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
      opacity:1; transition:opacity .4s; pointer-events:none;
    }
    .topbar .title { font-weight:700; font-size:15px; letter-spacing:.2px; text-shadow:0 1px 4px rgba(0,0,0,.6); }
    .topbar .counter {
      font-weight:700; font-size:13px; background:rgba(255,255,255,.12);
      padding:4px 12px; border-radius:999px; backdrop-filter:blur(4px);
      direction:ltr;
    }
    /* controls */
    .nav-btn {
      position:fixed; top:50%; transform:translateY(-50%); z-index:6;
      width:54px; height:54px; border:none; border-radius:50%;
      background:rgba(255,255,255,.14); color:var(--cream);
      font-size:26px; line-height:1; cursor:pointer; backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center;
      transition:background .2s, opacity .4s;
    }
    .nav-btn:hover { background:rgba(255,210,63,.85); color:var(--ink); }
    #prev { right:18px; }   /* RTL: previous on the right */
    #next { left:18px; }    /* RTL: next on the left */
    .nav-btn:disabled { opacity:.25; cursor:default; }
    /* bottom progress dots */
    .dots {
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:5;
      display:flex; gap:7px; flex-wrap:wrap; justify-content:center; max-width:80vw;
      padding:8px 14px; background:rgba(0,0,0,.4); border-radius:999px; backdrop-filter:blur(4px);
      transition:opacity .4s;
    }
    .dot { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:background .2s, transform .2s; }
    .dot.active { background:var(--yellow); transform:scale(1.25); }
    /* exit + fullscreen buttons */
    .corner-btn {
      position:fixed; z-index:6; border:none; cursor:pointer;
      background:rgba(255,255,255,.14); color:var(--cream); backdrop-filter:blur(6px);
      border-radius:10px; padding:7px 12px; font-size:13px; font-weight:600;
      display:inline-flex; align-items:center; gap:6px; transition:background .2s;
      pointer-events:auto;
    }
    .corner-btn:hover { background:rgba(255,255,255,.28); }
    /* idle: hide chrome */
    body.idle .topbar, body.idle .dots, body.idle .nav-btn { opacity:0; }
    body.idle #stage { cursor:none; }
    @media (max-width:640px){
      .nav-btn{ width:44px; height:44px; font-size:22px; }
      .topbar .title{ font-size:13px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title" id="deckTitle"></div>
    <div style="display:flex; align-items:center; gap:10px; pointer-events:auto;">
      <span class="counter" id="counter">1 / 1</span>
      <button class="corner-btn" id="fsBtn" title="מסך מלא">⛶ מסך מלא</button>
      <a class="corner-btn" href="index.html#w10" title="חזרה לסילבוס">✕ יציאה</a>
    </div>
  </div>

  <div id="stage">
    <img id="slide" alt="שקופית" draggable="false">
  </div>

  <button class="nav-btn" id="prev" aria-label="הקודם">›</button>
  <button class="nav-btn" id="next" aria-label="הבא">‹</button>

  <div class="dots" id="dots"></div>

  <script>
    // ---- deck manifest ----
    var DECKS = {
      1: { count:10, title:"פרק 1 · בראשית — נברא מעצב המשחקים" },
      2: { count:11, title:"פרק 2 · המעצב יוצר חוויה" },
      3: { count:10, title:"פרק 3 · איך חוויה נולדת ממשחק" },
      4: { count:15, title:"פרק 4 · האנטומיה של עיר חיה" },
      5: { count:13, title:"פרק 5 · מתכון לכאוס מתוכנן היטב" }
    };

    function param(name){
      var m = new RegExp('[?&]'+name+'=([^&]+)').exec(location.search);
      return m ? decodeURIComponent(m[1]) : null;
    }
    var deckId = parseInt(param('deck'), 10);
    if (!DECKS[deckId]) deckId = 1;
    var deck = DECKS[deckId];
    var total = deck.count;
    var idx = 0; // 0-based

    var slideEl   = document.getElementById('slide');
    var counterEl = document.getElementById('counter');
    var prevBtn   = document.getElementById('prev');
    var nextBtn   = document.getElementById('next');
    var dotsEl    = document.getElementById('dots');

    document.getElementById('deckTitle').textContent = deck.title;

    function pad(n){ return n < 10 ? '0'+n : ''+n; }
    function src(i){ return 'assets/gamedesign/deck'+deckId+'/slide-'+pad(i+1)+'.jpg'; }

    // build dots
    for (var i=0;i<total;i++){
      var d = document.createElement('div');
      d.className='dot'; d.dataset.i=i;
      d.addEventListener('click', (function(j){ return function(e){ e.stopPropagation(); go(j); }; })(i));
      dotsEl.appendChild(d);
    }
    var dotEls = dotsEl.querySelectorAll('.dot');

    function preload(i){ if(i>=0 && i<total){ var im=new Image(); im.src=src(i); } }

    function render(){
      slideEl.src = src(idx);
      slideEl.alt = deck.title + ' — שקופית ' + (idx+1);
      counterEl.textContent = (idx+1) + ' / ' + total;
      prevBtn.disabled = (idx === 0);
      nextBtn.disabled = (idx === total-1);
      for (var k=0;k<dotEls.length;k++) dotEls[k].classList.toggle('active', k===idx);
      preload(idx+1); preload(idx-1);
      try { history.replaceState(null,'', '?deck='+deckId+'&s='+(idx+1)); } catch(e){}
    }
    function go(i){ if(i<0||i>=total) return; idx=i; render(); }
    function next(){ go(idx+1); }
    function prev(){ go(idx-1); }

    // start at slide from URL if present
    var startS = parseInt(param('s'),10);
    if (startS>=1 && startS<=total) idx = startS-1;

    nextBtn.addEventListener('click', function(e){ e.stopPropagation(); next(); });
    prevBtn.addEventListener('click', function(e){ e.stopPropagation(); prev(); });

    // click on stage advances; shift/right-click style not needed
    document.getElementById('stage').addEventListener('click', function(){ next(); });

    // keyboard (RTL-aware)
    document.addEventListener('keydown', function(e){
      switch(e.key){
        case 'ArrowLeft': case 'PageDown': case ' ': case 'Enter': next(); e.preventDefault(); break;
        case 'ArrowRight': case 'PageUp': case 'Backspace': prev(); e.preventDefault(); break;
        case 'Home': go(0); break;
        case 'End': go(total-1); break;
        case 'Escape': if(document.fullscreenElement){ /* browser exits FS itself */ } else { location.href='index.html#w10'; } break;
        case 'f': case 'F': toggleFs(); break;
      }
    });

    // fullscreen
    function toggleFs(){
      if (document.fullscreenElement){ document.exitFullscreen && document.exitFullscreen(); }
      else { var el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el); }
    }
    document.getElementById('fsBtn').addEventListener('click', function(e){ e.stopPropagation(); toggleFs(); });
    // try to go fullscreen on first interaction (browsers require a gesture)
    var triedFs=false;
    function tryFsOnce(){ if(triedFs) return; triedFs=true; try{ toggleFs(); }catch(e){} }
    document.addEventListener('click', tryFsOnce, { once:true });

    // auto-hide chrome when idle
    var idleTimer;
    function activity(){
      document.body.classList.remove('idle');
      clearTimeout(idleTimer);
      idleTimer = setTimeout(function(){ document.body.classList.add('idle'); }, 2500);
    }
    ['mousemove','click','keydown','touchstart'].forEach(function(ev){ document.addEventListener(ev, activity); });
    activity();

    // swipe (touch)
    var tx=null;
    document.addEventListener('touchstart', function(e){ tx=e.touches[0].clientX; }, {passive:true});
    document.addEventListener('touchend', function(e){
      if(tx===null) return; var dx=e.changedTouches[0].clientX - tx; tx=null;
      if(Math.abs(dx)<40) return;
      if(dx<0) next(); else prev();   // RTL: swipe left = next
    }, {passive:true});

    render();
  </script>
</body>
</html>
